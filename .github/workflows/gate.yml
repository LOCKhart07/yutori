name: Gate

# Reusable workflow — called by release.yml (on tag push),
# pr-checks.yml (on pull_request), and main.yml (on push to main).
# Keep detekt + unit-test gating in one place so callers can't drift.

on:
  workflow_call:

permissions:
  contents: read

jobs:
  detekt:
    name: Detekt
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e  # v6.1.0
        with:
          # Default is read-only on non-default branches; this workflow
          # is called from main pushes, tag pushes, and PRs, so without
          # this override non-main runs never write cache and pay
          # cold-dep cost every time.
          cache-read-only: false

      - name: Run detekt
        run: ./gradlew detekt --continue --parallel --build-cache --stacktrace

      - name: Upload detekt reports
        # Only when detekt actually fails. The report is worthless on
        # green, and uploading on every run meant an account-wide
        # Actions artifact-storage quota exhaustion (shared with other
        # repos) failed this step → failed the gate → skipped the APK
        # build, blocking releases. The release APK is a GitHub Release
        # asset (separate storage), so it was never the real problem.
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: detekt-reports
          path: android/**/build/reports/detekt/*

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e  # v6.1.0
        with:
          # Default is read-only on non-default branches; this workflow
          # is called from main pushes, tag pushes, and PRs, so without
          # this override non-main runs never write cache and pay
          # cold-dep cost every time.
          cache-read-only: false

      - name: Run unit tests
        run: >-
          ./gradlew
          :parser:test :classifier:test :budget:test :transactions:test
          :ingestion:test :database:test :app:testDebugUnitTest
          --parallel --build-cache --stacktrace
