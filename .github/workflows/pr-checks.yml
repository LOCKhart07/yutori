name: PR checks
run-name: "PR #${{ github.event.pull_request.number }}"

# Runs on every PR into main. Calls the reusable gate.yml so detekt +
# tests match exactly what gates releases and main-cache warmups.
#
# To make checks required before merge, flip on in
# Settings → Branches → main → Require status checks →
# tick `gate / detekt` and `gate / test`.
# See docs/copilot-coding-agent.md.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: read

jobs:
  gate:
    uses: ./.github/workflows/gate.yml
