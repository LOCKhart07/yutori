name: PR checks
run-name: "PR #${{ github.event.pull_request.number }}"

# Runs on every PR into main. Calls the reusable tests.yml so the
# gradle invocation matches exactly what gates a release.
#
# To make checks required before merge, flip on in
# Settings → Branches → main → Require status checks →
# tick `tests / test` and `detekt`.
# See docs/copilot-coding-agent.md.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: read

jobs:
  tests:
    uses: ./.github/workflows/tests.yml

  detekt:
    name: Detekt
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: false

      - name: Run detekt
        run: ./gradlew detekt --continue --parallel --build-cache --stacktrace

      - name: Upload detekt reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-reports-pr
          path: android/**/build/reports/detekt/*
