name: Release APK
run-name: Release ${{ github.ref_name }}

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@v3

      - name: Run unit tests
        run: >-
          ./gradlew
          :parser:test :classifier:test :budget:test :transactions:test
          :ingestion:test :database:test :app:testDebugUnitTest
          --no-daemon --stacktrace

  build-release:
    name: Build & publish release APK
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: android
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history — the versionCode is derived from `git rev-list
          # --count HEAD` at build time, so a shallow clone (depth 1)
          # would collapse every build to versionCode=1 and break the
          # autoupdater's "newer APK" comparison.
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@v3

      - name: Determine signing mode
        id: signing
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
          SIGNING_KEYSTORE_PASSWORD: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          if [ -n "$SIGNING_KEYSTORE_BASE64" ] \
             && [ -n "$SIGNING_KEYSTORE_PASSWORD" ] \
             && [ -n "$SIGNING_KEY_ALIAS" ] \
             && [ -n "$SIGNING_KEY_PASSWORD" ]; then
            echo "mode=release" >> "$GITHUB_OUTPUT"
            echo "::notice title=Signing mode::Release keystore detected — building a properly signed release APK."
          else
            echo "mode=debug" >> "$GITHUB_OUTPUT"
            echo "::warning title=Signing mode::No release keystore secrets found. The release APK will be signed with Android's debug key. This is fine for side-loading by the app author, but NOT suitable for public distribution."
          fi

      - name: Decode keystore
        if: steps.signing.outputs.mode == 'release'
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          mkdir -p "$RUNNER_TEMP/signing"
          echo "$SIGNING_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/signing/release.keystore"
          echo "SIGNING_KEYSTORE_PATH=$RUNNER_TEMP/signing/release.keystore" >> "$GITHUB_ENV"

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Assemble release APK
        env:
          SIGNING_KEYSTORE_PASSWORD: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Stage APK with release name
        id: stage
        run: |
          src="app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$src" ]; then
            src="app/build/outputs/apk/release/app-release-unsigned.apk"
          fi
          if [ ! -f "$src" ]; then
            echo "Could not find release APK under app/build/outputs/apk/release/" >&2
            ls -la app/build/outputs/apk/release/ || true
            exit 1
          fi
          dest="$RUNNER_TEMP/spendwise-${GITHUB_REF_NAME}.apk"
          cp "$src" "$dest"
          sha=$(sha256sum "$dest" | awk '{print $1}')
          echo "apk_path=$dest"     >> "$GITHUB_OUTPUT"
          echo "apk_sha256=$sha"    >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          # --current picks only the commits between the previous tag
          # and this one (HEAD). --strip header trims the blank top
          # line so the body starts directly at "## <version>".
          args: --current --strip header
        env:
          OUTPUT: CHANGELOG.md

      - name: Build release body
        id: body
        working-directory: ${{ github.workspace }}
        run: |
          {
            cat "${{ steps.cliff.outputs.changelog }}"
            echo
            echo "---"
            echo
            echo "**Signing mode:** ${{ steps.signing.outputs.mode }}"
            echo
            echo "**APK SHA-256:** \`${{ steps.stage.outputs.apk_sha256 }}\`"
          } > "$RUNNER_TEMP/release-body.md"
          echo "body_path=$RUNNER_TEMP/release-body.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release & upload APK
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: true
          body_path: ${{ steps.body.outputs.body_path }}
          files: ${{ steps.stage.outputs.apk_path }}
